name: Release

on:
  push:
    branches:
      - main

# Only one release can run at a time on main
concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Reuse the full CI pipeline as a gate.
  # Release only proceeds when all checks pass.
  # ─────────────────────────────────────────────
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ─────────────────────────────────────────────
  # Package a production build and attach it to
  # the workflow run as a downloadable artifact.
  # In a real deployment this job would push the
  # image to ECR / upload to S3 / deploy to ECS.
  # ─────────────────────────────────────────────
  package:
    name: Package Build
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install production dependencies only
        run: npm ci --omit=dev

      - name: Install dev deps for build step
        run: npm install --save-dev typescript prisma tsx

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Build TypeScript
        run: npm run build

      - name: Create release bundle
        run: |
          mkdir -p release
          cp -r dist release/
          cp -r node_modules release/
          cp package.json release/
          cp prisma.config.ts release/
          cp -r prisma release/
          echo "${{ github.sha }}" > release/BUILD_SHA.txt
          echo "${{ github.ref_name }}" > release/BUILD_REF.txt
          tar -czf release-${{ github.sha }}.tar.gz release/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.sha }}
          path: release-${{ github.sha }}.tar.gz
          retention-days: 30